  if (!confirm("Delete this product?")) return;
  const prev = state.products.map(p => ({ ...p }));
  state.products = state.products.filter(p => p.id !== id);
  saveProducts();
  try {
    await deleteProductFromSupabase(id);
  } catch (err) {
    state.products = prev; saveProducts();
    toast(err.message || "Sync failed", "error"); renderMain(); return;
  }
  toast("Product deleted", "success");
  renderMain();
}

function handleEdit(id) {
  const product = state.products.find(p => p.id === id);
  if (!canModifyProduct(product)) { toast("You can only edit your own products", "error"); return; }
  const p = state.products.find(p => p.id === id);
  if (p) {
    state.dashboardFormData = {};
    state.editing = { ...p };
    pendingProductImages = (p.images && p.images.length)
      ? p.images.map(url => ({ url }))
      : p.image
        ? [{ url: p.image }]
        : [];
    state.view = "dashboard"; render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

async function openProductModal(id) {
  let p = state.products.find(p => p.id === id);
  if (!p) return;
  if (isFreePrice(p.price) && !p.isClaimed) {
    const claimed = await claimFreeProduct(p);
    if (claimed) p = claimed;
  }
  state.selectedProduct = { ...p };
  state.trendingPickerOpenFor = null;
  renderProductModal();
}

function closeProductModal() { state.selectedProduct = null; state.trendingPickerOpenFor = null; stopProductModalImageSlider(); renderProductModal(); }

function startProductModalImageSlider() {
  stopProductModalImageSlider();
  const slider = $(".product-modal-slider");
  if (!slider) return;
  const images = JSON.parse(slider.dataset.images || "[]");
  if (images.length <= 1) return;
  const img = slider.querySelector("img");
  const dotButtons = Array.from(slider.querySelectorAll(".slider-dot-btn"));
  const prevBtn = slider.querySelector(".product-slider-nav.prev");
  const nextBtn = slider.querySelector(".product-slider-nav.next");
  let index = Number(slider.dataset.index || 0);
  let resumeTimer = null;
  let touchStartX = 0;

  const updateSlider = nextIndex => {
    index = (nextIndex + images.length) % images.length;
    slider.dataset.index = String(index);
    if (img) img.src = images[index];
    dotButtons.forEach((btn, i) => {
      btn.querySelector(".slider-dot")?.classList.toggle("active", i === index);
    });
  };

  const startAutoSlide = () => {
    if (productModalImageTimer) clearInterval(productModalImageTimer);
    productModalImageTimer = setInterval(() => updateSlider(index + 1), 8000);
  };

  const pauseAndResume = () => {
    if (productModalImageTimer) {
      clearInterval(productModalImageTimer);
      productModalImageTimer = null;
    }
    if (resumeTimer) clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => {
      resumeTimer = null;
      startAutoSlide();
    }, 15000);
    slider._resumeTimer = resumeTimer;
  };

  const handleManualSlide = nextIndex => {
    updateSlider(nextIndex);
    pauseAndResume();
  };

  prevBtn?.addEventListener("click", event => {
    event.stopPropagation();
    handleManualSlide(index - 1);
  });
  nextBtn?.addEventListener("click", event => {
    event.stopPropagation();
    handleManualSlide(index + 1);
  });
  dotButtons.forEach(btn => {
    btn.addEventListener("click", event => {
      event.stopPropagation();
      handleManualSlide(Number(btn.dataset.index || 0));
    });
  });

  slider.addEventListener("touchstart", event => {
    touchStartX = event.changedTouches[0]?.clientX || 0;
  }, { passive: true });

  slider.addEventListener("touchend", event => {
    const touchEndX = event.changedTouches[0]?.clientX || 0;
    const deltaX = touchEndX - touchStartX;
    if (Math.abs(deltaX) < 35) return;
    handleManualSlide(index + (deltaX < 0 ? 1 : -1));
  }, { passive: true });

  updateSlider(index);
  startAutoSlide();
}

function stopProductModalImageSlider() {
  if (productModalImageTimer) { clearInterval(productModalImageTimer); productModalImageTimer = null; }
  const slider = $(".product-modal-slider");
  if (slider?._resumeTimer) {
    clearTimeout(slider._resumeTimer);
    slider._resumeTimer = null;
  }
}

function openInfoModal({ title, message, type, badgeLabel, badgeIcon }) {
  state.infoModal = { title, message, type, badgeLabel, badgeIcon };
  renderInfoModal();
}
function closeInfoModal() { state.infoModal = null; renderInfoModal(); }
function openPromoCreditModal(title, message) {
  openInfoModal({ title, message, type: "error", badgeLabel: "Promo Credits", badgeIcon: "fa-bullhorn" });
}
function openDirectionsGuide(link) { state.directionsGuideLink = String(link || "").trim(); renderDirectionsGuideModal(); }
function closeDirectionsGuide() { state.directionsGuideLink = ""; renderDirectionsGuideModal(); }
function confirmDirectionsGuide() {
  const link = state.directionsGuideLink;
  closeDirectionsGuide();
  if (link) window.open(link, "_blank", "noopener,noreferrer");
}

let pendingProductImages = [];
let imageUploadSelectionMode = "single";
let productModalImageTimer = null;
let productCardImageTimer = null;

function getDashboardProductImageItems() {
  if (pendingProductImages.length > 0) return pendingProductImages;
  if (state.editing?.images?.length) return state.editing.images.map(url => ({ url }));
  if (state.editing?.image) return [{ url: state.editing.image }];
  return [];
}

function getProductImageInput() {
  let input = $("#product-image-input");
  if (input) return input;
  input = document.createElement("input");
  input.type = "file";
  input.id = "product-image-input";
  input.accept = "image/*";
  input.style.display = "none";
  input.onchange = handleFileUpload;
  document.body.appendChild(input);
  return input;
}

function openImageUploadChoice() {
  closeImageUploadChoice();
  const overlay = document.createElement("div");
  overlay.className = "image-choice-overlay";
  overlay.onclick = e => { if (e.target === overlay) closeImageUploadChoice(); };
  overlay.innerHTML = `
    <div class="image-choice-card" onclick="event.stopPropagation()">
      <h4>Upload images</h4>
      <p>Select single image or multiple images (max 7) for this product.</p>
      <div class="image-choice-buttons">
        <button type="button" class="submit-btn" onclick="chooseProductImageMode('single')">Single Image</button>
        <button type="button" class="submit-btn" onclick="chooseProductImageMode('multiple')">Multiple Images</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeImageUploadChoice() {
  $(".image-choice-overlay")?.remove();
}

function chooseProductImageMode(mode) {
  closeImageUploadChoice();
  const input = getProductImageInput();
  input.multiple = mode === "multiple";
  input.value = "";
  imageUploadSelectionMode = mode;
  input.click();
}

function setUploadPreviewState({ loading = false, image = "", showPlaceholder = false } = {}) {
  const shell = $(".preview-shell");
  if (!shell) return;
  shell.classList.toggle("is-loading", loading);
  if (loading) { shell.innerHTML = ""; return; }
  if (image) { shell.innerHTML = `<img src="${escHtml(image)}" alt="Preview" class="preview-image">`; return; }
  if (showPlaceholder) shell.innerHTML = `<span class="preview-placeholder">Image preview will appear here</span>`;
}

function removeProductImage(index) {
  const currentItems = getDashboardProductImageItems().map(item => ({ ...item }));
  if (index < 0 || index >= currentItems.length) return;
  currentItems.splice(index, 1);
  pendingProductImages = currentItems;
  renderMain();
}

function setMainProductImage(index) {
  const currentItems = getDashboardProductImageItems().map(item => ({ ...item }));
  if (index < 0 || index >= currentItems.length || index === 0) return;
  const [selected] = currentItems.splice(index, 1);
  currentItems.unshift(selected);
  pendingProductImages = currentItems;
  renderMain();
}

function handleFileUpload(event) {
  const files = Array.from(event.target.files || []);
  if (files.length === 0) return;
  const validFiles = files.filter(file => file.type.startsWith("image/"));
  if (validFiles.length !== files.length) { toast("Only image files are allowed", "error"); return; }

  const existingCount = pendingProductImages.length;
  const isMultiple = event.target.multiple;
  const newFiles = isMultiple ? validFiles : [validFiles[0]];
  if (existingCount + newFiles.length > 7) {
    toast("Maximum 7 images allowed for one product", "error");
    event.target.value = "";
    return;
  }

  const newItems = newFiles.map(file => ({ file, url: URL.createObjectURL(file) }));
  if (isMultiple) {
    pendingProductImages = [...pendingProductImages, ...newItems];
  } else {
    pendingProductImages = newItems;
  }

  event.target.value = "";
  renderMain();
}

async function handleProductSubmit(event) {
  event.preventDefault();
  if (!canManageProducts()) { toast("Admin access required", "error"); return; }
  const currentAgent = getCurrentAgentRecord();
  const isAgentUser = state.user?.role === "agent";
  if (isAgentUser && !currentAgent) { toast("Agent account not available", "error"); return; }

  const fd    = new FormData(event.target);
  const title = fd.get("title")?.toString().trim();
  const price = fd.get("price")?.toString();
  const phone = fd.get("phone")?.toString().trim();
  const defaultLocationLink = isAgentUser
    ? state.settings.defaultLocationLink || ""
    : fd.get("defaultLocationLink")?.toString().trim() || "";

  if (!title || !price || !phone) { toast("Title, price and phone are required", "error"); return; }

  const imageItems = getDashboardProductImageItems();
  if (imageItems.length === 0) { toast("Please upload at least one image", "error"); return; }

  showLoadingOverlay("Uploading images…");
  let uploadedItems;
  try {
    uploadedItems = await Promise.all(imageItems.map(async item => {
      if (!item.file) return item;
      const uploaded = await uploadToCloudinary(item.file);
      return { url: uploaded.url, publicId: uploaded.public_id };
    }));
  } catch (err) {
    hideLoadingOverlay();
    toast(err.message || "Image upload failed", "error");
    return;
  } finally {
    hideLoadingOverlay();
  }

  const images = uploadedItems.map(item => item.url).filter(Boolean);
  if (images.length === 0) { toast("No valid images were uploaded", "error"); return; }

  const productData = {
    title,
    category: fd.get("category")?.toString().trim() || "Uncategorized",
    oldPrice: fd.get("oldPrice") ? parseFloat(fd.get("oldPrice")) : null,
    price: parseFloat(price),
    phone,
    agentId: isAgentUser ? currentAgent.id : (fd.get("agentId")?.toString().trim() || ""),
    locationLink: fd.get("locationLink")?.toString().trim() || "",
    desc: fd.get("desc")?.toString().trim() || "Premium item",
    image: images[0],
    images,
    image_urls: images,
    cloudinaryPublicIds: uploadedItems.map(item => item.publicId || ""),
    trending: state.editing?.trending || false,
    carouselBadge: state.editing?.carouselBadge || "trending",
    idNumber: state.editing?.idNumber || "",
    isClaimed: state.editing?.isClaimed || false,
    claimedByName: state.editing?.claimedByName || "",
    claimedByEmail: state.editing?.claimedByEmail || "",
    claimedAt: state.editing?.claimedAt || null,
    claimedServiceConfirmed: state.editing?.claimedServiceConfirmed || false,
    promoId: state.editing?.promoId || "",
    trendingUntil: state.editing?.trendingUntil || null,
  };

  const prevProds = state.products.map(p => ({ ...p }));
  const prevSettings = { ...state.settings };
  state.settings.defaultLocationLink = defaultLocationLink;
  saveSettings();

  showLoadingOverlay("Saving product…");
  try {
    if (state.editing) {
      if (!canModifyProduct(state.editing)) {
        hideLoadingOverlay();
        toast("You can only edit your own products", "error");
        return;
      }
      state.isEditingDashboard = false; state.dashboardFormData = {};
      const editId = state.editing.id;
      state.products = state.products.map(p => p.id === editId ? { ...p, ...productData } : p);
      const up = state.products.find(p => p.id === editId);
      if (up) await syncProductToSupabase(up);
      await syncSettingsToSupabase(state.settings);
      toast("Product updated", "success");
      state.editing = null;
    } else {
      state.isEditingDashboard = false; state.dashboardFormData = {};
      const newProd = { ...productData, id: generateUUID(), idNumber: getNextProductIdNumber(), available: true };
      state.products = [newProd, ...state.products];
      await syncProductToSupabase(newProd);
      await syncSettingsToSupabase(state.settings);
      toast("Product added", "success");
    }
  } catch (err) {
    state.products = prevProds; state.settings = prevSettings;
    saveProducts(); saveSettings();
    toast(err.message || "Sync failed", "error");
    renderMain(); return;
  } finally {
    hideLoadingOverlay();
  }

  saveProducts();
  pendingProductImages = [];
  const input = $("#product-image-input");
  if (input) input.value = "";
  event.target.reset();
  renderMain();
}

function cancelEdit() {
  state.editing = null; state.isEditingDashboard = false; state.dashboardFormData = {};
  pendingProductImages = [];
  const input = $("#product-image-input");
  if (input) input.value = "";
  renderMain();
}

function showAgentProducts(agentId) {
  state.view = "home"; state.productFilter = "all"; state.agentProductFilterId = agentId;
  state.category = "all"; state.search = "";
  toggleSidebar(false); renderMain();
  requestAnimationFrame(() => { $(".products-section")?.scrollIntoView({ behavior: "smooth", block: "start" }); });
}

function selectCategory(cat) { state.category = cat; state.view = "home"; render(); }

// ====== CAROUSEL ======
function initCarousel() {
  const track   = $(".carousel-track");
  const trending = getTrendingProducts();
  if (!track || trending.length <= 1) { stopCarousel(); return; }
  stopCarousel();
  carouselInterval = setInterval(() => {
    carouselIndex = (carouselIndex + 1) % trending.length;
    updateCarousel();
  }, 4500);
}

function stopCarousel() {
  if (carouselInterval) { clearInterval(carouselInterval); carouselInterval = null; }
}

function goToSlide(index) { carouselIndex = index; updateCarousel(); stopCarousel(); initCarousel(); }

function updateCarousel() {
  const track = $(".carousel-track");
  const dots   = $$(".carousel-dot");
  if (track) track.style.transform = `translateX(-${carouselIndex * 100}%)`;
  dots.forEach((dot, i) => dot.classList.toggle("active", i === carouselIndex));
}

// ====== POLLING ======
let pollTimer = null;

async function pollForNewElements() {
  if (!hasRemoteBackend() || hasDashboardDraft()) return;
  try {
    await replaceStateFromSupabase();
    if (state.view === "home" || state.view === "dashboard" || state.view === "agents" || state.view === "promo") renderMain();
  } catch (err) { console.error("Poll refresh failed:", err); }
}

function startPollTimer() {
  if (pollTimer) clearInterval(pollTimer);
  if (hasRemoteBackend()) pollTimer = setInterval(pollForNewElements, 12000);
}

// ====== INIT ======
async function init() {
  state.settings = loadSettings();
  state.products  = loadProducts();
  state.agents    = loadAgents();
  state.promotions = loadPromotions();
  state.user      = loadSession();

  const app = $("#app");
  app.className = "min-h-screen bg-background";
  app.innerHTML = "";

  await syncUserFromAuthSession();
  render();
  showIntroVideoOverlay();

  await hydrateRemoteState();
  subscribeToProductChanges();
  startPollTimer();
  if (hasSecureAuth()) {
    supabaseClient.auth.onAuthStateChange(() => {
      syncUserFromAuthSession().then(() => render());
    });
  }

  window.addEventListener("offline", () => toast("You are offline — changes saved locally", "error"));
  window.addEventListener("online",  () => toast("Back online", "success"));
}

document.addEventListener("DOMContentLoaded", init);

  </script>
