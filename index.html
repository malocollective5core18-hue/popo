<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lomi-Store</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>

/* Lomi-Store - Converted from Tailwind to Plain CSS */

:root {
  --background: 220 33% 97%;
  --foreground: 222 47% 11%;
  --card: 0 0% 100%;
  --card-foreground: 222 47% 11%;
  --popover: 0 0% 100%;
  --popover-foreground: 222 47% 11%;
  --primary: 156 49% 11%;
  --primary-foreground: 40 33% 97%;
  --secondary: 210 40% 96%;
  --secondary-foreground: 222 47% 11%;
  --muted: 210 40% 96%;
  --muted-foreground: 215 16% 47%;
  --accent: 32 95% 44%;
  --accent-foreground: 0 0% 100%;
  --destructive: 0 84% 60%;
  --destructive-foreground: 0 0% 100%;
  --success: 158 64% 21%;
  --success-foreground: 158 50% 92%;
  --border: 214 32% 91%;
  --input: 214 32% 91%;
  --sidebar-background: 0 0% 100%;
  --sidebar-foreground: 222 47% 11%;
  --sidebar-primary: 156 49% 11%;
  --sidebar-accent: 210 40% 96%;
  --sidebar-border: 214 32% 91%;
  --radius: 1rem;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  padding: 0;
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

.min-h-screen { min-height: 100vh; }
.bg-background { background: hsl(var(--background)); }
.text-foreground { color: hsl(var(--foreground)); }

/* Header */
header.sticky {
  position: sticky;
  top: 0;
  z-index: 110;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  padding: 0 4px;
  border-bottom: 1px solid hsl(var(--border));
  background: hsl(var(--card) / 0.95);
  backdrop-filter: blur(12px);
}

@media (min-width: 768px) {
  header {
    height: 70px;
    padding: 0 10px;
  }
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.325rem;
  font-weight: 800;
  cursor: pointer;
  touch-action: manipulation;
}

.text-brand {
  background: linear-gradient(145deg, hsl(158 64% 21%), hsl(32 95% 35%));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.menu-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 50%;
  background: hsl(var(--muted));
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}

.menu-btn:active { transform: scale(0.95); }

.menu-btn span {
  display: block;
  width: 20px;
  height: 2px;
  background: hsl(var(--foreground));
  border-radius: 1px;
}

/* Main */
main {
  padding-bottom: 40px;
}

/* Hero Carousel */
.carousel-section {
  margin: 12px;
  overflow: hidden;
  border-radius: 1.5rem;
  background: hsl(var(--card));
  box-shadow: 0 2px 8px hsl(222 47% 11% / 0.04);
}

@media (min-width: 640px) { .carousel-section { margin: 20px; } }
@media (min-width: 768px) { .carousel-section { margin: 40px; } }
@media (min-width: 1024px) {
  .carousel-section {
    margin-left: auto;
    margin-right: auto;
    max-width: 1400px;
  }
}

.carousel-track {
  display: flex;
  transition: transform 0.5s ease-out;
}

.carousel-slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  min-width: 100%;
  padding: 24px;
  background: linear-gradient(135deg, hsl(48 96% 95%) 0%, hsl(0deg 98.53% 49.98%) 100%);
  text-align: center;
  cursor: pointer;
}

@media (min-width: 640px) {
  .carousel-slide {
    flex-direction: row;
    padding: 32px;
    text-align: left;
  }
}

@media (min-width: 768px) { .carousel-slide { padding: 48px; } }

.carousel-content { flex: 1; }

.carousel-title {
  margin-bottom: 8px;
  font-size: 1.25rem;
  font-weight: 800;
  line-height: 1.2;
}

@media (min-width: 640px) { .carousel-title { font-size: 1.5rem; } }
@media (min-width: 768px) { .carousel-title { font-size: 1.875rem; } }

.carousel-desc {
  font-size: 0.875rem;
  color: hsl(215deg 81.98% 24.68%);
}

@media (min-width: 640px) { .carousel-desc { font-size: 1rem; } }

.carousel-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 4px 12px;
  border-radius: 9999px;
  background: hsl(var(--accent));
  font-size: 0.75rem;
  font-weight: 700;
  color: hsl(var(--accent-foreground));
}

.carousel-badge.hot {
  background: linear-gradient(135deg, hsl(9 95% 58%), hsl(29 95% 48%));
  color: hsl(0 0% 100%);
}
.carousel-badge.trending {
  background: linear-gradient(135deg, hsl(156 49% 22%), hsl(171 74% 36%));
  color: hsl(0 0% 100%);
}
.carousel-badge.popular {
  background: linear-gradient(135deg, hsl(244 67% 58%), hsl(220 74% 52%));
  color: hsl(0 0% 100%);
}

.carousel-meta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}

.carousel-image-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-image {
  width: min(68vw, 220px);
  aspect-ratio: 1 / 1;
  border-radius: 1rem;
  object-fit: cover;
}

.carousel-discount-burst {
  position: absolute;
  top: -68px;
  right: -55px;
  display: grid;
  place-items: center;
  width: 86px;
  height: 86px;
  padding: 10px;
  background: radial-gradient(circle at 35% 35%, hsl(322.49deg 100% 50%) 58%, hsl(14 91% 48%) 100%);
  clip-path: polygon(50% 0%, 60% 12%, 74% 4%, 78% 20%, 92% 14%, 88% 30%, 100% 38%, 88% 50%, 100% 62%, 86% 70%, 92% 86%, 78% 80%, 74% 96%, 60% 88%, 50% 100%, 40% 88%, 26% 96%, 22% 80%, 8% 86%, 14% 70%, 0% 62%, 12% 50%, 0% 38%, 12% 30%, 8% 14%, 22% 20%, 26% 4%, 40% 12%);
  box-shadow: 0 18px 30px hsl(15 85% 38% / 0.32);
  color: hsl(0 0% 100%);
  text-align: center;
}

.carousel-discount-burst.free-burst {
  top: -62px;
  right: -37px;
  width: 78px;
  height: 78px;
  border-radius: 50%;
  clip-path: none;
  background: hsl(0deg 100% 50%);
  box-shadow: 0 18px 30px hsl(0 72% 42% / 0.34);
}

.carousel-discount-burst strong { display: block; font-size: 1.15rem; line-height: 1; }
.carousel-discount-burst span {
  display: block;
  margin-top: 3px;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.carousel-discount-burst.desktop-only { display: none; }

@media (min-width: 640px) {
  .carousel-image { width: 240px; flex: 0 0 240px; }
}
@media (min-width: 768px) {
  .carousel-image { width: 320px; flex-basis: 320px; }
}
@media (min-width: 1024px) {
  .carousel-discount-burst.mobile-only { display: none; }
  .carousel-discount-burst.desktop-only {
    position: static;
    display: grid;
    margin-left: 31px;
  }
  .carousel-discount-burst.desktop-only.free-burst {
    width: 78px;
    height: 78px;
    margin-left: 31px;
  }
  .carousel-discount-burst.desktop-only strong { font-size: 1.3rem; }
  .carousel-discount-burst.desktop-only span { font-size: 0.68rem; }
}

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  background: hsl(var(--card));
}

.carousel-dot {
  width: 8px;
  height: 8px;
  border: none;
  border-radius: 9999px;
  background: hsl(var(--border));
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.2s;
}

.carousel-dot.active { width: 28px; background: hsl(var(--accent)); }
.carousel-dot:not(.active):hover { background: hsl(var(--muted-foreground)); }

/* Search Section */
.search-section {
  margin: 12px;
  display: flex;
  flex-direction: row;
  gap: 12px;
  padding: 14px;
  border: 1px solid hsl(34 92% 56% / 0.28);
  border-radius: 1.35rem;
  background: linear-gradient(135deg, hsl(45 100% 96%) 0%, hsl(31 100% 92%) 52%, hsl(156 45% 94%) 100%);
}

@media (min-width: 640px) { .search-section { margin: 20px; } }
@media (min-width: 768px) { .search-section { margin: 40px; } }
@media (min-width: 1024px) {
  .search-section { margin-left: auto; margin-right: auto; max-width: 1400px; }
}

.search-wrapper { position: relative; flex: 2; }

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: hsl(var(--muted-foreground));
  pointer-events: none;
}

.input-field {
  width: 100%;
  padding: 7px 15px;
  border: 1px solid hsl(32 80% 62% / 0.45);
  border-radius: 9999px;
  background: hsl(0 0% 100% / 0.96);
  font-size: 0.75rem;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-field:focus {
  border-color: hsl(var(--accent));
  box-shadow: 0 0 0 3px hsl(var(--accent) / 0.3);
}

.input-field.pl-11 { padding-left: 44px; }

.category-select {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid hsl(32 80% 62% / 0.45);
  border-radius: 9999px;
  background: hsl(0 0% 100% / 0.96);
  font-size: 0.75rem;
  font-weight: 500;
  outline: none;
  cursor: pointer;
}

.category-select:focus { border-color: hsl(var(--accent)); }

/* Products Grid */
.products-section { margin: 12px; }
@media (min-width: 640px) { .products-section { margin: 20px; } }
@media (min-width: 768px) { .products-section { margin: 40px; } }
@media (min-width: 1024px) {
  .products-section { margin-left: auto; margin-right: auto; max-width: 1400px; }
}

.section-title {
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.25rem;
  font-weight: 800;
}

.text-accent { color: hsl(var(--accent)); }

.section-count {
  margin-left: 8px;
  font-size: 0.875rem;
  font-weight: 500;
  color: hsl(var(--muted-foreground));
}

.free-status-badge {
  margin-left: auto;
  padding: 5px 10px;
  border-radius: 9999px;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
  cursor: pointer;
}

.free-status-badge.on {
  background: hsl(var(--success) / 0.14);
  color: hsl(var(--success));
}

.free-status-badge.off {
  background: hsl(var(--destructive) / 0.14);
  color: hsl(var(--destructive));
}

.products-grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: calc((100% - 0px) / 3.1);
  gap: 8px;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  padding-bottom: 8px;
  scroll-snap-type: x proximity;
  scrollbar-width: thin;
}

.products-grid::-webkit-scrollbar { height: 6px; }
.products-grid::-webkit-scrollbar-thumb { border-radius: 9999px; background: hsl(var(--border)); }
.products-grid > .product-card { min-width: 0; scroll-snap-align: start; }

@media (min-width: 640px) {
  .products-grid {
    grid-auto-flow: row;
    grid-auto-columns: auto;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    overflow-x: visible;
    padding-bottom: 0;
    scroll-snap-type: none;
  }
}
@media (min-width: 768px) { .products-grid { gap: 20px; } }
@media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1280px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }

/* Product Card */
.product-card {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 0.85rem;
  background: hsl(var(--card));
  box-shadow: 0 2px 8px hsl(222 47% 11% / 0.04);
  transition: box-shadow 0.2s, transform 0.2s;
}

.product-card.spotlight {
  box-shadow: 0 0 0 4px hsl(var(--accent) / 0.5), 0 0 0 10px hsl(var(--accent) / 0.16), 0 18px 36px hsl(222 47% 11% / 0.18);
  transform: translateY(-6px) scale(1.02);
  animation: spotlightPulse 0.9s ease-in-out 2;
}

@keyframes spotlightPulse {
  0% { box-shadow: 0 0 0 0 hsl(var(--accent) / 0.45), 0 0 0 0 hsl(var(--accent) / 0.18), 0 18px 36px hsl(222 47% 11% / 0.12); }
  50% { box-shadow: 0 0 0 5px hsl(var(--accent) / 0.55), 0 0 0 14px hsl(var(--accent) / 0.2), 0 22px 42px hsl(222 47% 11% / 0.18); }
  100% { box-shadow: 0 0 0 4px hsl(var(--accent) / 0.5), 0 0 0 10px hsl(var(--accent) / 0.16), 0 18px 36px hsl(222 47% 11% / 0.18); }
}

.product-card:hover { box-shadow: 0 10px 30px hsl(222 47% 11% / 0.08); }

.product-img {
  width: 100%;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  object-position: center;
  background: hsl(var(--muted));
  display: block;
}

.product-content {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  padding: 10px;
}

.product-category {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 0.56rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: hsl(var(--accent));
}

.product-category span:first-of-type { min-width: 0; }

.id_number-badge {
  flex: 0 0 auto;
  padding: 3px 8px;
  border-radius: 9999px;
  background: hsl(32deg 3.28% 88.59%);
  font-size: 0.52rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  color: hsl(0deg 0% 0%);
  white-space: nowrap;
}

.product-title { margin-bottom: 4px; font-size: 0.82rem; font-weight: 700; line-height: 1.25; }

.product-desc {
  margin-bottom: 12px;
  font-size: 0.62rem;
  color: hsl(var(--muted-foreground));
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-prices {
  margin-bottom: 12px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) max-content;
  align-items: center;
  gap: 4px 6px;
  margin-top: auto;
  min-width: 0;
}

.old-price {
  grid-column: 1;
  min-width: 0;
  max-width: 100%;
  font-size: 0.62rem;
  color: hsl(var(--muted-foreground));
  text-decoration: line-through;
  white-space: nowrap;
  overflow: hidden;
}

.current-price {
  grid-column: 1;
  min-width: 0;
  max-width: 100%;
  font-size: 0.7rem;
  font-weight: 800;
  color: hsl(var(--primary));
  white-space: nowrap;
  overflow: hidden;
}

.discount-badge {
  grid-column: 2;
  grid-row: 1 / span 2;
  align-self: center;
  justify-self: end;
  min-width: max-content;
  max-width: 100%;
  padding: 2px 6px;
  border-radius: 9999px;
  background: hsl(var(--destructive));
  font-size: 0.52rem;
  font-weight: 700;
  color: hsl(var(--destructive-foreground));
  white-space: nowrap;
}

.discount-badge.free-badge {
  font-size: 0.7rem;
  color: hsl(var(--success-foreground));
}

@media (max-width: 420px) {
  .product-prices { grid-template-columns: minmax(0, 1fr); }
  .discount-badge { grid-column: 1; grid-row: auto; justify-self: end; margin-top: 2px; }
}

.product-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.availability-btn {
  padding: 5px 8px;
  border: none;
  border-radius: 9999px;
  font-size: 0.58rem;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}

@media (min-width: 640px) {
  .product-card { border-radius: 1rem; }
  .product-content { padding: 16px; }
  .product-category { font-size: 0.65rem; }
  .id_number-badge { font-size: 0.62rem; }
  .product-title { font-size: 1rem; }
  .product-desc { font-size: 0.75rem; }
  .product-prices { gap: 8px; }
  .old-price { font-size: 0.75rem; }
  .current-price { font-size: 0.85rem; }
  .discount-badge.free-badge { font-size: 0.85rem; }
  .discount-badge { padding: 2px 8px; font-size: 0.65rem; }
  .availability-btn { padding: 6px 12px; font-size: 0.7rem; }
}

.availability-btn:active { transform: scale(0.95); }
.availability-btn.available { background: hsl(var(--success) / 0.15); color: hsl(var(--success)); }
.availability-btn.unavailable { background: hsl(var(--destructive) / 0.1); color: hsl(var(--destructive)); }

.admin-actions { display: flex; align-items: center; gap: 4px; }

.edit-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 600;
  color: hsl(var(--accent));
  background: transparent;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s;
}

.edit-btn:active { transform: scale(0.95); }

.delete-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 9999px;
  font-size: 0.75rem;
  color: hsl(var(--muted-foreground));
  background: transparent;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.1s, color 0.1s;
}

.delete-btn:active { transform: scale(0.95); }
.delete-btn:hover { color: hsl(var(--destructive)); }

/* Dashboard */
.dashboard-section {
  margin: 12px;
  border-radius: 1.5rem;
  background: hsl(var(--card));
  padding: 20px;
  box-shadow: 0 2px 8px hsl(222 47% 11% / 0.04);
}

@media (min-width: 640px) { .dashboard-section { margin: 20px; padding: 24px; } }
@media (min-width: 768px) { .dashboard-section { margin: 40px; padding: 32px; } }
@media (min-width: 1024px) {
  .dashboard-section { margin-left: auto; margin-right: auto; max-width: 1400px; }
}

.dashboard-header {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

@media (min-width: 768px) {
  .dashboard-header { flex-direction: row; align-items: center; justify-content: space-between; }
}

.dashboard-title {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px 10px;
  margin: 0;
  font-size: 1.25rem;
  font-weight: 800;
}

@media (min-width: 768px) { .dashboard-title { font-size: 1.5rem; } }

.dashboard-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

@media (min-width: 768px) {
  .dashboard-title-row {
    justify-content: space-between;
    gap: 12px;
  }
}

.dashboard-badge {
  align-self: flex-end;
  padding: 4px 12px;
  border-radius: 9999px;
  background: hsl(var(--secondary));
  font-size: 0.75rem;
  font-weight: 600;
  color: hsl(var(--secondary-foreground));
}

.dashboard-form {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

@media (min-width: 768px) {
  .dashboard-form { grid-template-columns: repeat(2, 1fr); }
}

.form-field { display: flex; flex-direction: column; }
.form-field.full-width { grid-column: 1 / -1; }

.form-label {
  margin-bottom: 4px;
  display: block;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: hsl(var(--muted-foreground));
}

.form-textarea { resize: none; }

.form-file {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 16px;
  border: 2px dashed hsl(var(--border));
  border-radius: 1rem;
  background: hsl(var(--muted) / 0.4);
  text-align: center;
  font-size: 0.875rem;
  cursor: pointer;
  transition: background 0.1s;
}

.form-file:hover { background: hsl(var(--accent) / 0.05); }
.form-file input { display: none; }
.form-file i { font-size: 1.125rem; }

.preview-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 104px;
  margin-top: 8px;
  border: 1px dashed hsl(var(--border));
  border-radius: 0.875rem;
  background: hsl(var(--card));
}

.preview-shell.is-loading::after {
  content: "Loading image...";
  font-size: 0.75rem;
  font-weight: 600;

.promo-modal {

footer {

  font-size: 0.75rem;

/* Toast */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: 8px;
  background: hsl(var(--card));
  box-shadow: 0 4px 12px hsl(0 0% 0% / 0.15);
  font-size: 0.875rem;
  font-weight: 500;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { border-left: 4px solid hsl(var(--success)); }
.toast.error { border-left: 4px solid hsl(var(--destructive)); }

/* Loading spinner */
.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: hsl(var(--background) / 0.85);

// SECURITY MODEL:
// - Authentication is handled by Supabase Auth

// ====== SUPABASE SETUP (run once in Supabase SQL editor) ======
// create extension if not exists pgcrypto;
//
// create table if not exists profiles (
//   user_id uuid primary key references auth.users(id) on delete cascade,
//   email text unique not null,
//   full_name text,
//   role text not null default 'user' check (role in ('user', 'admin')),
//   created_at timestamptz not null default now()
// );
//
// create table if not exists agents (
//   id uuid primary key default gen_random_uuid(),
//   full_name text not null,
//   email text unique not null,
//   plan text not null default 'Free Plan',
//   subscription_days integer not null default 30,
//   status text not null default 'active',
//   created_at timestamptz not null default now()
// );
//
// alter table profiles enable row level security;
// alter table agents enable row level security;
//
// create policy "profiles own row read"
// on profiles for select to authenticated
// using (auth.uid() = user_id);
//
// create policy "profiles own row insert"
// on profiles for insert to authenticated
// with check (auth.uid() = user_id);
//
// create policy "profiles own row update"
// on profiles for update to authenticated
// using (auth.uid() = user_id)
// with check (auth.uid() = user_id);
//
// create policy "agents own row read"
// on agents for select to authenticated
// using (lower(email) = lower(coalesce(auth.jwt()->>'email', '')));
//
// create policy "admins manage agents"
// on agents for all to authenticated
// using (exists (
//   select 1 from profiles
//   where profiles.user_id = auth.uid() and profiles.role = 'admin'
// ))
// with check (exists (
//   select 1 from profiles
//   where profiles.user_id = auth.uid() and profiles.role = 'admin'
// ));
//
// create policy "public products read"
// on products for select to anon, authenticated
// using (true);
//
// create policy "promo own row read"
// on agent_promotions for select to authenticated
// using (
//   lower(email) = lower(coalesce(auth.jwt()->>'email', ''))
//   or exists (
//     select 1 from profiles
//     where profiles.user_id = auth.uid() and profiles.role = 'admin'
//   )

//
// create policy "settings public read"

// ====== RETRY HELPER ======
async function withRetry(fn, retries = 2, delayMs = 800) {
  let lastError;
  for (let i = 0; i <= retries; i++) {
    try { return await fn(); }
    catch (err) {
      lastError = err;
      if (i < retries) await new Promise(r => setTimeout(r, delayMs * (i + 1)));
    }
  }
  throw lastError;
}

function disableRemoteBackend(reason = "Remote backend unavailable") {
  if (backendDisabled) return;
  backendDisabled = true;
  backendDisableReason = reason;
  if (productsSubscription && typeof productsSubscription.unsubscribe === "function") {
    productsSubscription.unsubscribe();
  }
  productsSubscription = null;
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  console.warn(reason);
}

function shouldDisableBackend(error) {
  const text = String(error?.message || error || "");
  return text.includes("Failed to fetch")
    || text.includes("ERR_NAME_NOT_RESOLVED")
    || text.includes("NetworkError");
}

// ====== CLOUDINARY UPLOAD ======
async function uploadToCloudinary(file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", CLD_PRESET);
  formData.append("folder", CLD_FOLDER);

  const response = await withRetry(async () => {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`, {
      method: "POST",
      body: formData,
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `Cloudinary upload failed (${res.status})`);
    }
    return res.json();
  }, 2, 1000);

  if (!response.secure_url) throw new Error("Cloudinary did not return a URL");
  return { url: response.secure_url, public_id: response.public_id };
}

async function fetchProductsFromSupabase() {
  if (!hasRemoteBackend()) return [];
  try {
    const { data, error } = await supabaseClient
      .from("products").select("*").order("created_at", { ascending: false });
    if (error) throw new Error(error.message);
    return (data || []).map(mapSupabaseProduct);
  } catch (error) {
    if (shouldDisableBackend(error)) disableRemoteBackend("Supabase is unreachable. Using local data only.");
    throw error;
  }
}

async function fetchAgentsFromSupabase() {
  if (!hasRemoteBackend()) return [];
  try {
    if (isAdminUser()) {
      const { data, error } = await supabaseClient
        .from(AGENTS_TABLE)
        .select("id, full_name, email, plan, subscription_days, status, created_at")
        .order("created_at", { ascending: false });
      if (error) throw new Error(error.message);
      return (data || []).map(mapSupabaseAgent);
    }
    if (state.user?.role === "agent" && state.user.email) {
      const ownAgent = await fetchAgentByEmail(state.user.email);
      return ownAgent ? [ownAgent] : [];
    }
    return [];
  } catch (error) {
    if (shouldDisableBackend(error)) disableRemoteBackend("Supabase is unreachable. Using local data only.");

  }
}

async function fetchPromotionsFromSupabase() {
  if (!hasRemoteBackend()) return [];
  try {
    let query = supabaseClient.from("agent_promotions").select("*");
    if (isAdminUser()) {
      query = query.order("created_at", { ascending: false });
    } else if (state.user?.role === "agent" && state.user.agentId) {

      return [];

    const { data, error } = await query;
    if (error) throw new Error(error.message);
    return (data || []).map(mapSupabasePromotion);
  } catch (error) {
    if (shouldDisableBackend(error)) disableRemoteBackend("Supabase is unreachable. Using local data only.");
    throw error;
  }
}

async function fetchSettingsFromSupabase() {
  if (!hasRemoteBackend()) return null;
  try {
    const { data, error } = await supabaseClient
      .from("shop_settings").select("key, value")
      .in("key", ["default_location_link", "product_id_sequence", "promo_price_per_day"]);
    if (error) throw new Error(error.message);

    const mapped = { defaultLocationLink: "", productIdSequence: 1, promoPricePerDay: 200 };
    (data || []).forEach(item => {
      if (item.key === "default_location_link") mapped.defaultLocationLink = item.value || "";
      if (item.key === "product_id_sequence") mapped.productIdSequence = Math.max(1, Number(item.value) || 1);
      if (item.key === "promo_price_per_day") mapped.promoPricePerDay = Math.max(1, Number(item.value) || 200);
    });
    return mapped;
  } catch (error) {
    if (shouldDisableBackend(error)) disableRemoteBackend("Supabase is unreachable. Using local data only.");
    throw error;
  }
}

async function hydrateRemoteState() {
  if (!hasRemoteBackend()) return;
  showLoadingOverlay("Syncing store data…");
  try {
    const [promoRes, pRes, aRes, sRes] = await Promise.allSettled([
      fetchPromotionsFromSupabase(),
      fetchProductsFromSupabase(),
      fetchAgentsFromSupabase(),
      fetchSettingsFromSupabase(),
    ]);

    const hasNetworkFailure = [promoRes, pRes, aRes, sRes].some(result =>
      result.status === "rejected" && shouldDisableBackend(result.reason)
    );
    if (!hasNetworkFailure) {
      if (promoRes.status === "rejected") console.warn("Promotions fetch failed:", promoRes.reason);
      if (pRes.status === "rejected") console.warn("Products fetch failed:", pRes.reason);
      if (aRes.status === "rejected") console.warn("Agents fetch failed:", aRes.reason);
      if (sRes.status === "rejected") console.warn("Settings fetch failed:", sRes.reason);
    }

    const remotePromotions = promoRes.status === "fulfilled" ? promoRes.value : [];
    const remoteProducts   = pRes.status === "fulfilled" ? pRes.value : [];
    const remoteAgents     = aRes.status === "fulfilled" ? aRes.value : [];
    const remoteSettings   = sRes.status === "fulfilled" ? sRes.value : null;

    if (remoteSettings) state.settings = { ...state.settings, ...remoteSettings };

    const { products } = ensureProductIdNumbers(remoteProducts || []);
    state.products = products;
    state.agents   = remoteAgents || [];
    state.promotions = remotePromotions || [];

    saveProducts();
    saveAgents(state.agents);
    savePromotions(state.promotions);
    saveSettings();
    renderMain();
  } catch (err) {
    if (!shouldDisableBackend(err)) console.error("Remote hydration error:", err);
  } finally {
    hideLoadingOverlay();
  }
}

async function replaceStateFromSupabase() {
  if (!hasRemoteBackend()) return;
  const [promoRes, pRes, aRes, sRes] = await Promise.allSettled([
    fetchPromotionsFromSupabase(),
    fetchProductsFromSupabase(),
    fetchAgentsFromSupabase(),
    fetchSettingsFromSupabase(),
  ]);

  const remotePromotions = promoRes.status === "fulfilled" ? promoRes.value : state.promotions;
  const remoteProducts   = pRes.status === "fulfilled" ? pRes.value : state.products;
  const remoteAgents     = aRes.status === "fulfilled" ? aRes.value : state.agents;
  const remoteSettings   = sRes.status === "fulfilled" ? sRes.value : null;

  if (remoteSettings) state.settings = { ...state.settings, ...remoteSettings };
  const { products } = ensureProductIdNumbers(remoteProducts || []);
  state.products = products;
  state.agents   = remoteAgents || [];
  state.promotions = remotePromotions || [];
  saveProducts();
  saveAgents(state.agents);
  savePromotions(state.promotions);
  saveSettings();
}

function subscribeToProductChanges() {
  if (!hasRemoteBackend() || productsSubscription) return;
  productsSubscription = supabaseClient
    .channel("products_channel")
    .on("postgres_changes", { event: "*", schema: "public", table: "products" }, async () => {
      try {
        if (hasDashboardDraft()) return;
        await replaceStateFromSupabase();
        if (state.view === "home" || state.view === "dashboard" || state.view === "agents" || state.view === "promo") renderMain();
      } catch (err) { console.error("Realtime refresh failed:", err); }
    })
    .subscribe();
}

async function syncUserFromAuthSession() {
  if (!hasSecureAuth()) {
    state.user = loadSession();
    return state.user;
  }
  try {
    const { data, error } = await supabaseClient.auth.getSession();
    if (error) throw error;
    const authUser = data?.session?.user || null;
    if (!authUser?.email) {
      state.user = null;
      saveSession(null);
      return null;
    }

    let profile = await fetchProfileByUserId(authUser.id);
    if (!profile) {
      profile = await upsertOwnProfile({
        userId: authUser.id,
        email: authUser.email,
        fullName: authUser.user_metadata?.full_name || "",
        role: "user",
      });
    }

    const agent = await fetchAgentByEmail(authUser.email);
    const role = profile?.role === "admin" ? "admin" : agent ? "agent" : "user";
    const user = {
      id: authUser.id,
      email: authUser.email,
      role,
      fullName: profile?.full_name || authUser.user_metadata?.full_name || agent?.fullName || authUser.email.split("@")[0],
      agentId: agent?.id || null,
    };

    state.user = user;
    saveSession(user);
    if (agent) upsertAgentCache(agent);
    return user;
  } catch (err) {
    console.error("Session sync failed:", err);
    state.user = null;
    saveSession(null);
    return null;
  }
}

function $(sel) { return document.querySelector(sel); }

function fitPriceText(root = document) {
  root.querySelectorAll(".product-prices .old-price, .product-prices .current-price").forEach(node => {
    const base = parseFloat(node.dataset.baseFontSize || window.getComputedStyle(node).fontSize);
    node.dataset.baseFontSize = String(base);
    node.style.fontSize = `${base}px`;
    let next = base;
    while (node.scrollWidth > node.clientWidth && next > 8) { next -= 0.5; node.style.fontSize = `${next}px`; }
  });
}

function formatPrice(amount) {
  const value = Number(amount);
  if (!Number.isFinite(value)) return "0Tzsh/=";
  if (value <= 0) return "Free";
  return `${Math.round(value).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 })}Tzsh/=`;
}

function isFreePrice(amount) {
  const v = Number(amount);
  return Number.isFinite(v) && v <= 0;
}

function formatPhoneLink(phone) {
  return `tel:${String(phone || "").replace(/[^\d+]/g, "")}`;
}

function buildDirectionsUrl(sharedLink) {
  const raw = String(sharedLink || "").trim();
  if (!raw) return "";
  try {
    const url = new URL(raw);
    const params = url.searchParams;
    let dest = params.get("destination") || params.get("query") || params.get("q");
    if (!dest) {
      const atM = url.href.match(/@(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)/);
      const mM  = url.href.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
      const pM  = url.pathname.match(/\/place\/([^/]+)/);
      if (atM) dest = `${atM[1]},${atM[2]}`;
      else if (mM) dest = `${mM[1]},${mM[2]}`;
      else if (pM) dest = decodeURIComponent(pM[1]).replace(/\+/g, " ");
    }
    if (!dest) return raw;
    return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(dest)}&travelmode=driving`;
  } catch { return raw; }
}

function getAlphabetPrefix(index) {
  let v = index, r = "";
  do { r = String.fromCharCode(65 + (v % 26)) + r; v = Math.floor(v / 26) - 1; } while (v >= 0);
  return r;
}

function formatProductNumber(seq) {
  const block = Math.floor((seq - 1) / 999);
  const num   = ((seq - 1) % 999) + 1;
  if (block === 0) return String(num);
  return `${getAlphabetPrefix(block - 1)}${num}`;
}

function ensureProductIdNumbers(products) {
  const used = new Set();
  let seq = Math.max(1, Number(state.settings.productIdSequence) || 1);
  let changed = false;
  const normalized = products.map(p => {
    if (p.idNumber && !used.has(p.idNumber)) { used.add(p.idNumber); return p; }
    while (seq === 666 || used.has(formatProductNumber(seq))) seq++;
    const idNumber = formatProductNumber(seq);
    used.add(idNumber); seq++; changed = true;
    return { ...p, idNumber };
  });
  while (seq === 666 || used.has(formatProductNumber(seq))) seq++;
  state.settings.productIdSequence = seq;
  return { products: normalized, changed };
}

function getNextProductIdNumber() {
  const used = new Set(state.products.map(p => p.idNumber).filter(Boolean));
  let seq = Math.max(1, Number(state.settings.productIdSequence) || 1);
  while (seq === 666 || used.has(formatProductNumber(seq))) seq++;
  const idNumber = formatProductNumber(seq);
  state.settings.productIdSequence = seq + 1;
  saveSettings();
  return idNumber;
}

function saveDashboardFormData(event) {
  if (state.view !== "dashboard") return;
  const form = event?.target?.form || event?.currentTarget || $(".dashboard-form");
  if (!form) return;
  const data = {};

    if (el.name) {
      if (el.type === "checkbox" || el.type === "radio") data[el.name] = el.checked;
      else data[el.name] = el.value;

  });
  state.dashboardFormData = data;
}

  const overlay = document.createElement("div");
  overlay.className = "agent-overlay promo-settings-overlay";
  overlay.onclick = e => { if (e.target === overlay) closePromoSettingsModal(); };

  const modal = document.createElement("div");
  modal.className = "agent-modal promo-settings-modal";
  modal.innerHTML = `
    <button class="auth-close" onclick="closePromoSettingsModal()">×</button>
    <h3 class="agent-modal-title">Promo Settings</h3>
    <p class="agent-modal-copy">Set the price for 1 post per 1 day. This value is used to calculate every promo package total.</p>
    <form class="agent-form" onsubmit="handlePromoSettingsSubmit(event)">
      <div class="form-field full-width">
        <label class="form-label">1 Post Per Day Price</label>
        <input type="number" class="input-field" name="promoPricePerDay" min="1" step="0.01" value="${Number(state.settings?.promoPricePerDay || 200)}" required>

      <div class="agent-modal-actions">
        <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Save Settings</button>
        <button type="button" class="cancel-btn" onclick="closePromoSettingsModal()">Cancel</button>
      </div>
    </form>`;

  document.body.appendChild(overlay);
  document.body.appendChild(modal);
}

function renderProductModal() {
  const existing = $(".product-modal-overlay");
  if (existing) existing.remove();
  if (!state.selectedProduct) return;

  const prod = state.selectedProduct;
  const isFree = isFreePrice(prod.price);
  const discount = prod.oldPrice && prod.oldPrice > prod.price
    ? Math.round(((prod.oldPrice - prod.price) / prod.oldPrice) * 100) : null;
  const phoneLink    = formatPhoneLink(prod.phone || "+255742000000");
  const locationLink = buildDirectionsUrl(prod.locationLink || state.settings.defaultLocationLink);
  const isAdmin      = canManageProducts();
  const trendingAccess = getTrendingAccessState(prod);
  const canManageTrending = trendingAccess.allowed;
  const showTrendingControl = trendingAccess.showControl;
  const pickerOpen   = state.trendingPickerOpenFor === prod.id;
  const restrictedByAgent = isProductOwnedBySuspendedAgent(prod);
  const restrictedByClaim = prod.isClaimed && !canAccessClaimedProduct(prod);
  const hideDetails = restrictedByAgent || restrictedByClaim;
  const productImages = (prod.images && prod.images.length)
    ? prod.images
    : prod.image
      ? [prod.image]
      : [];
  const productImagesAttr = JSON.stringify(productImages).replace(/'/g, "&#39;");

  const overlay = document.createElement("div");
  overlay.className = "product-modal-overlay";
  overlay.onclick = e => { if (e.target === overlay) closeProductModal(); };

  overlay.innerHTML = `
    <div class="product-modal">
      <button class="product-modal-close" onclick="closeProductModal()"><i class="fas fa-times"></i></button>
      <div class="product-modal-body">
        ${productImages.length > 1 ? `
        <div class="product-modal-slider" data-images='${productImagesAttr}' data-index="0">
          <span class="multi-image-badge"><i class="fas fa-images"></i> ${productImages.length} photos</span>
          <button type="button" class="product-slider-nav prev" aria-label="Previous image"><i class="fas fa-chevron-left"></i></button>
          <img src="${escHtml(productImages[0])}" alt="${escHtml(prod.title)}" class="product-modal-image" onerror="this.src='https://via.placeholder.com/900x900?text=Image'">
          <button type="button" class="product-slider-nav next" aria-label="Next image"><i class="fas fa-chevron-right"></i></button>
          <div class="slider-dots">
            ${productImages.map((_, index) => `
              <button type="button" class="slider-dot-btn" data-index="${index}" aria-label="View image ${index + 1}">
                <span class="slider-dot${index === 0 ? " active" : ""}"></span>
              </button>`).join("")}
          </div>
        </div>` : `
        <img src="${escHtml(prod.image || productImages[0] || '')}" alt="${escHtml(prod.title)}" class="product-modal-image" onerror="this.src='https://via.placeholder.com/900x900?text=Image'">`}
        <div class="product-modal-content">
          <div class="product-modal-category"><i class="fas fa-tag"></i> ${escHtml(prod.category)}</div>
          <h3 class="product-modal-title">${escHtml(prod.title)}</h3>
          ${hideDetails ? "" : `<p class="product-modal-desc">${escHtml(prod.desc)}</p>`}
          <div class="product-modal-prices">
            ${prod.oldPrice ? `<span class="old-price">${formatPrice(prod.oldPrice)}</span>` : ""}
            <span class="current-price">${formatPrice(prod.price)}</span>
            ${prod.isClaimed
              ? `<span class="discount-badge">CLAIMED</span>`
              : isFree ? `<span class="discount-badge free-badge">FREE</span>` : discount ? `<span class="discount-badge">-${discount}%</span>` : ""}
          </div>
          ${hideDetails ? "" : `
          <div class="product-modal-actions">
            <a class="product-icon-btn call-btn" href="${escHtml(phoneLink)}"><i class="fas fa-phone-alt"></i><span>Call</span></a>
            ${locationLink
              ? `<button class="product-icon-btn location-btn" type="button" onclick="openDirectionsGuide('${escHtml(locationLink)}')"><i class="fas fa-location-dot"></i><span>Location</span></button>`
              : `<button class="product-icon-btn location-btn disabled" type="button" disabled><i class="fas fa-location-dot"></i><span>Location</span></button>`
            }
          </div>`}
          ${prod.isClaimed && hideDetails ? `<p class="product-desc" style="margin-top:12px;">This free product has already been claimed.</p>` : ""}
          ${showTrendingControl ? `
          <div class="product-admin-actions">
            <button class="product-icon-btn trending-toggle-btn ${prod.trending ? "active" : ""}" type="button" onclick="toggleTrendingPicker('${prod.id}')">
              <i class="fas ${prod.trending ? "fa-star" : "fa-plus"}"></i>
              <span>${prod.trending ? "Change Trending Badge" : state.user?.role === "agent" ? "Use Promo In Trending" : "Choose Trending Badge"}</span>
            </button>
            ${canManageTrending && prod.trending ? `
            <button class="product-icon-btn trending-toggle-btn" type="button" onclick="removeFromTrending('${prod.id}')">
              <i class="fas fa-xmark"></i><span>Remove Trending</span>
            </button>` : ""}
          </div>` : ""}
        </div>
      </div>
    </div>
    ${pickerOpen ? `
    <div class="trending-picker" onclick="closeTrendingPicker()">
      <div class="trending-picker-card" onclick="event.stopPropagation()">
        <h4 class="trending-picker-title">Choose Carousel Badge</h4>
        <p class="trending-picker-copy">Pick a badge for this trending product.</p>
        <select class="trending-picker-select" onchange="handleTrendingBadgeSelect('${prod.id}', this.value)">
          <option value="">Select carousel badge (optional)</option>
          ${Object.entries(carouselBadgeOptions).map(([key, opt]) =>
            `<option value="${key}" ${prod.carouselBadge === key ? "selected" : ""}>${opt.label}</option>`
          ).join("")}
        </select>
        <div class="trending-picker-actions">
          <button class="product-icon-btn trending-toggle-btn trending-picker-btn" type="button" onclick="closeTrendingPicker()">
            <i class="fas fa-forward"></i><span>Skip</span>
          </button>
        </div>
      </div>
    </div>` : ""}`;
  document.body.appendChild(overlay);
  startProductModalImageSlider();
}

function renderDirectionsGuideModal() {
  const existing = $(".directions-guide-overlay");
  if (existing) existing.remove();
  if (!state.directionsGuideLink) return;

      <div class="directions-guide-body">

        <div class="directions-guide-actions">
          <button class="cancel-btn" type="button" onclick="closeDirectionsGuide()">Cancel</button>

function renderMain() {
  if (state.view !== "dashboard") state.isEditingDashboard = false;
  let main = $("main");
  if (!main) {
    main = document.createElement("main");
    const footer = $("footer");
    if (footer) footer.before(main);
    else $("#app").appendChild(main);
  }

  let content = "";
  if (state.view === "home") {
    content += renderCarousel() + renderSearch() + renderProducts();
  } else if (state.view === "dashboard") {
    content += renderDashboard();
  } else if (state.view === "agents") {
    content += renderAgents();
  } else if (state.view === "promo") {
    content += renderPromo();
  } else if (state.view === "claimed-products") {
    content += renderClaimedProducts();
  } else if (state.view === "categories") {
    content += renderCategories();
  }

  main.innerHTML = content;
  requestAnimationFrame(() => fitPriceText(main));
  if (state.view === "home") initCarousel();
}

function refreshProductsSection() {
  if (state.view !== "home") { renderMain(); return; }
  const section = $(".products-section");
  if (!section) { renderMain(); return; }
  const tmp = document.createElement("div");
  tmp.innerHTML = renderProducts();
  section.replaceWith(tmp.firstElementChild);
  requestAnimationFrame(() => fitPriceText($(".products-section")));
}

function renderCarousel() {
  const trending = getTrendingProducts();
  if (trending.length === 0) {
    carouselIndex = 0;
    return `
      <section class="carousel-section">
        <div class="carousel-slide">
          <div class="carousel-content">
            <h2 class="carousel-title">No trending products yet</h2>
            <p class="carousel-desc">Admin can mark products as trending from the product modal.</p>
            <span class="carousel-badge"><i class="fas fa-chart-line"></i> Waiting</span>
          </div>
        </div>
      </section>`;
  }
  if (carouselIndex >= trending.length) carouselIndex = 0;

  const slidesHtml = trending.map(prod => {
    const isFree   = isFreePrice(prod.price);
    const discount = prod.oldPrice && prod.oldPrice > prod.price
      ? Math.round(((prod.oldPrice - prod.price) / prod.oldPrice) * 100) : null;
    const badge = carouselBadgeOptions[prod.carouselBadge] || carouselBadgeOptions.trending;
    const restrictedByClaim = prod.isClaimed && !canAccessClaimedProduct(prod);
    const restrictedByAgent = isProductOwnedBySuspendedAgent(prod);
    const hideDetails = restrictedByClaim || restrictedByAgent;
    return `
    <div class="carousel-slide" onclick="focusProductCard('${prod.id}')">
      <div class="carousel-content">
        <h2 class="carousel-title">${escHtml(prod.title)}</h2>
        <p class="carousel-desc">${hideDetails ? "This product is no longer publicly available." : escHtml(prod.desc)}</p>
        <div class="carousel-meta">
          <span class="carousel-badge ${badge.className}"><i class="fas ${badge.icon}"></i> ${badge.label}</span>
          ${prod.isClaimed ? `<div class="carousel-discount-burst free-burst desktop-only"><div><strong>TAKEN</strong><span>Claimed</span></div></div>`
            : isFree ? `<div class="carousel-discount-burst free-burst desktop-only"><div><strong>FREE</strong><span>Product</span></div></div>`
            : discount ? `<div class="carousel-discount-burst desktop-only"><div><strong>-${discount}%</strong><span>Discount</span></div></div>` : ""}
        </div>
      </div>
      <div class="carousel-image-wrapper">
        ${prod.isClaimed ? `<div class="carousel-discount-burst free-burst mobile-only"><div><strong>TAKEN</strong><span>Claimed</span></div></div>`
          : isFree ? `<div class="carousel-discount-burst free-burst mobile-only"><div><strong>FREE</strong><span>Product</span></div></div>`
          : discount ? `<div class="carousel-discount-burst mobile-only"><div><strong>-${discount}%</strong><span>Discount</span></div></div>` : ""}
        <img src="${escHtml(prod.image)}" alt="${escHtml(prod.title)}" class="carousel-image" loading="lazy">
      </div>
    </div>`;
  }).join("");

  const dotsHtml = trending.map((_, i) =>
    `<button class="carousel-dot${i === carouselIndex ? " active" : ""}" onclick="goToSlide(${i})"></button>`
  ).join("");

  return `
    <section class="carousel-section">
      <div class="carousel-track" style="transform:translateX(0)">${slidesHtml}</div>
      <div class="carousel-dots">${dotsHtml}</div>
    </section>`;
}

function renderSearch() {
  const categories = [...new Set(state.products.map(p => p.category || "Uncategorized"))];
  return `
    <section class="search-section">
      <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="product-search-input" class="input-field pl-11" placeholder="Search products or id..."
          value="${escHtml(state.search)}" oninput="handleSearch(this.value)">
      </div>
      <select class="category-select" onchange="handleCategoryChange(this.value)">
        <option value="all" ${state.category === "all" ? "selected" : ""}>All Categories</option>
        ${categories.map(c => `<option value="${escHtml(c)}" ${state.category === c ? "selected" : ""}>${escHtml(c)}</option>`).join("")}
      </select>
    </section>`;
}

function renderProducts() {
  const filtered = getFilteredProducts();
  const isAdmin  = state.user?.role === "admin";
  const hasFree  = state.products.some(p => isFreePrice(p.price) && canViewProductInListings(p));
  const activeAgent = state.agentProductFilterId
    ? state.agents.find(a => a.id === state.agentProductFilterId) : null;
  const label = state.agentProductFilterId
    ? `${activeAgent?.fullName || "Agent"} Products`
    : state.productFilter === "trending" ? "Trending Products"
    : state.productFilter === "free" ? "Free Products"
    : "Latest Drops";

  const grid = filtered.length === 0
    ? `<div class="empty-state"><i class="fas fa-box-open"></i>No products found.</div>`
    : filtered.map(prod => {
        const canModify = canModifyProduct(prod);
        const isFree   = isFreePrice(prod.price);
        const discount = prod.oldPrice && prod.oldPrice > prod.price
          ? Math.round(((prod.oldPrice - prod.price) / prod.oldPrice) * 100) : null;
        const restrictedByAgent = isProductOwnedBySuspendedAgent(prod);
        const restrictedByClaim = prod.isClaimed && !canAccessClaimedProduct(prod);
        const hideDetails = restrictedByAgent || restrictedByClaim;
        return `
          <article class="product-card" id="product-card-${prod.id}" onclick="openProductModal('${prod.id}')">
            <img src="${escHtml(prod.image)}" alt="${escHtml(prod.title)}" class="product-img"
              onerror="this.src='https://via.placeholder.com/600x450?text=Image'" loading="lazy">
            <div class="product-content">
              <div class="product-category">
                <span><i class="fas fa-tag"></i> ${escHtml(prod.category)}</span>
                <span class="id_number-badge">${escHtml(String(prod.idNumber || ""))}</span>
              </div>
              <h3 class="product-title">${escHtml(prod.title)}</h3>
              ${hideDetails ? "" : `<p class="product-desc">${escHtml(prod.desc)}</p>`}
              ${hideDetails
                ? `<div class="product-prices"><span class="current-price">${prod.isClaimed ? "Claimed" : "Hidden"}</span>${prod.isClaimed ? `<span class="discount-badge">CLAIMED</span>` : ""}</div>`
                : `<div class="product-prices">
                    ${prod.oldPrice ? `<span class="old-price">${formatPrice(prod.oldPrice)}</span>` : ""}
                    <span class="current-price">${formatPrice(prod.price)}</span>
                    ${prod.isClaimed
                      ? `<span class="discount-badge">CLAIMED</span>`
                      : isFree ? `<span class="discount-badge free-badge">FREE</span>` : discount ? `<span class="discount-badge">-${discount}%</span>` : ""}
                  </div>`}
              ${hideDetails && !isAdmin ? "" : `<div class="product-actions">
                <button class="availability-btn ${prod.available ? "available" : "unavailable"}"
                  onclick="event.stopPropagation(); handleToggleAvailable('${prod.id}')"
                  ${!isAdmin ? "disabled style='opacity:0.5'" : ""}>
                  ${prod.available ? "✓ Available" : "✗ Unavailable"}
                </button>
                ${canModify ? `
                  <div class="admin-actions">
                    <button class="edit-btn" onclick="event.stopPropagation(); handleEdit('${prod.id}')"><i class="fas fa-edit"></i> Edit</button>
                    <button class="delete-btn" onclick="event.stopPropagation(); handleDelete('${prod.id}')"><i class="fas fa-trash-alt"></i></button>
                  </div>` : ""}
              </div>`}
            </div>
          </article>`;
      }).join("");

  return `
    <section class="products-section">
      <h2 class="section-title">
        <i class="fas fa-fire text-accent"></i>
        <span>${label}</span>
        <span class="section-count">${filtered.length} item${filtered.length !== 1 ? "s" : ""}</span>
        <span class="free-status-badge ${hasFree ? "on" : "off"}" onclick="handleFreeStatusClick()">${hasFree ? "Free" : "Free Off"}</span>
      </h2>
      <div class="products-grid">${grid}</div>
    </section>`;
}

// ====== XSS HELPER ======
function escHtml(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ====== ACTIONS ======
function getFilteredAgents() {
  const term = state.agentSearch.toLowerCase();
  return state.agents.filter(a => {
    const matchSearch = !term || a.fullName.toLowerCase().includes(term) || a.email.toLowerCase().includes(term);
    const matchFilter = state.agentFilter === "all" || getAgentEffectiveStatus(a) === state.agentFilter;
    return matchSearch && matchFilter;
  });
}

function getPromoPricePerDay() {
  return Math.max(1, Number(state.settings?.promoPricePerDay) || 200);
}

function toDateOnly(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return new Date().toISOString().slice(0, 10);
  return date.toISOString().slice(0, 10);
}

function normalizePromoDraft(draft = {}) {
  const startDate = draft.startDate || new Date().toISOString().slice(0, 10);
  const rawDays = Math.max(1, Number(draft.daysCount) || 1);
  const derivedEnd = draft.endDate || addDaysToDate(startDate, rawDays - 1);
  const daysCount = Math.max(1, getInclusiveDaysBetween(startDate, derivedEnd));
  const postCount = Math.max(1, Number(draft.postCount) || 1);
  return {
    ...draft,
    postCount,
    startDate,
    endDate: addDaysToDate(startDate, daysCount - 1),
    daysCount,
    totalAmount: postCount * daysCount * getPromoPricePerDay(),
  };
}

function addDaysToDate(dateStr, days) {
  const date = new Date(`${dateStr}T00:00:00`);
  if (Number.isNaN(date.getTime())) return new Date().toISOString().slice(0, 10);
  date.setDate(date.getDate() + Math.max(0, Number(days) || 0));
  return date.toISOString().slice(0, 10);
}

function getInclusiveDaysBetween(startDate, endDate) {
  const start = new Date(`${startDate}T00:00:00`);
  const end = new Date(`${endDate}T00:00:00`);
  if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return 1;
  const diff = Math.round((end.getTime() - start.getTime()) / (24 * 60 * 60 * 1000));
  return Math.max(1, diff + 1);
}

function getPromoDraftPreview(draft = state.promoDraft || {}) {
  return normalizePromoDraft(draft);
}

function getPromoAgentMatches() {
  const term = state.promoSearch.toLowerCase().trim();
  return state.agents.filter(agent => {
    if (!term) return true;
    const haystack = `${agent.fullName} ${agent.email}`.toLowerCase();
    return haystack.includes(term);
  });
}

function getPromotionStatus(promo) {
  if (!promo) return "expired";
  if (promo.status === "cancelled") return "cancelled";
  const today = toDateOnly(new Date());
  if (promo.endDate < today) return "expired";
  if (promo.startDate > today) return "upcoming";
  return "active";
}

function getPromotionDaysLeft(promo) {
  if (!promo) return 0;
  const today = toDateOnly(new Date());
  if (promo.endDate < today) return 0;
  if (promo.startDate > today) return getInclusiveDaysBetween(promo.startDate, promo.endDate);
  return getInclusiveDaysBetween(today, promo.endDate);
}

function getPromotionDaysLabel(promo) {
  const daysLeft = getPromotionDaysLeft(promo);
  const status = getPromotionStatus(promo);
  if (status === "expired") return "0 days left";
  if (status === "upcoming") return `${daysLeft} day${daysLeft !== 1 ? "s" : ""} scheduled`;
  return `${daysLeft} day${daysLeft !== 1 ? "s" : ""} left`;
}

function getAgentPromoSummary(agentId) {
  const promos = state.promotions.filter(promo => promo.agentId === agentId);
  if (!promos.length) {
    return { text: "No promo credits", tone: "danger" };
  }
  const activePromo = promos.find(promo => getPromotionStatus(promo) === "active");
  if (activePromo) {
    const remaining = getPromotionSlotsRemaining(activePromo);
    const daysLeft = getPromotionDaysLeft(activePromo);
    const tone = daysLeft <= 3 || remaining <= 1 ? "warn" : "ok";
    return {
      text: `${remaining} credit${remaining !== 1 ? "s" : ""} • ${daysLeft} day${daysLeft !== 1 ? "s" : ""} left`,
      tone,
    };
  }
  const latestPromo = promos.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))[0];
  return {
    text: getPromotionStatus(latestPromo) === "upcoming" ? getPromotionDaysLabel(latestPromo) : "Promo expired",
    tone: "danger",
  };
}

function getPromotionAssignedProducts(promoId) {
  return state.products.filter(product =>
    product.promoId === promoId
    && product.trending
    && (!product.trendingUntil || new Date(product.trendingUntil).getTime() >= Date.now())
  );
}

function getPromotionSlotsRemaining(promo) {
  return Math.max(0, Math.max(1, Number(promo?.postCount) || 1) - getPromotionAssignedProducts(promo?.id).length);
}

function getActivePromotionsForAgent(agentId) {
  return state.promotions.filter(promo =>
    promo.agentId === agentId && getPromotionStatus(promo) === "active"
  );
}

function getEligiblePromotionForAgent(agentId, productId = "") {
  const activePromotions = getActivePromotionsForAgent(agentId);
  if (!activePromotions.length) return null;
  return activePromotions.find(promo => {
    const assigned = getPromotionAssignedProducts(promo.id);
    return assigned.some(product => product.id === productId) || assigned.length < Math.max(1, Number(promo.postCount) || 1);
  }) || null;
}

function getLatestPromotionForAgent(agentId) {
  const promotions = state.promotions
    .filter(promo => promo.agentId === agentId)
    .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
  return promotions[0] || null;
}

function getTrendingAccessState(product) {
  if (isAdminUser()) return { allowed: true, showControl: true, reason: "admin" };
  if (state.user?.role !== "agent" || !state.user.agentId) {
    return { allowed: false, showControl: false, reason: "not-agent" };
  }
  if (!product || product.agentId !== state.user.agentId) {
    return { allowed: false, showControl: false, reason: "not-owner" };
  }

  const agent = getCurrentAgentRecord();
  if (getAgentEffectiveStatus(agent) === "suspended") {
    return {
      allowed: false,
      showControl: true,
      reason: "agent-suspended",
      title: "Agent Access Paused",
      message: "Your agent access is suspended right now. Contact your admin to reactivate your account.",
    };
  }

  if (product.trending && product.promoId) {
    return { allowed: true, showControl: true, reason: "already-trending" };
  }

  const eligiblePromo = getEligiblePromotionForAgent(state.user.agentId, product.id);
  if (eligiblePromo) return { allowed: true, showControl: true, reason: "promo-active", promo: eligiblePromo };

  const latestPromo = getLatestPromotionForAgent(state.user.agentId);
  if (!latestPromo) {
    return {
      allowed: false,
      showControl: true,
      reason: "no-credits",
      title: "No Promo Credits",
      message: "Contact your admin for more credits before adding this post to trending.",
    };
  }

  if (getPromotionStatus(latestPromo) !== "active") {
    return {
      allowed: false,
      showControl: true,
      reason: "promo-expired",
      title: "Promo Days Ended",
      message: "Your promo days have ended. Contact your admin for more credits to continue adding trending posts.",
    };
  }

  return {
    allowed: false,
    showControl: true,
    reason: "credits-finished",
    title: "Credits Finished",
    message: "You are out of promo credits. Contact your admin for more credits before adding another trending post.",
  };
}

function isPromotionStillValidForProduct(product) {
  if (!product?.trending) return false;
  if (!product.promoId) return true;
  const promo = state.promotions.find(item => item.id === product.promoId);
  if (!promo) return false;
  if (getPromotionStatus(promo) !== "active") return false;
  if (!product.trendingUntil) return false;
  return new Date(product.trendingUntil).getTime() >= Date.now();
}

function canManageTrendingForProduct(product) {
  return getTrendingAccessState(product).allowed;
}

function formatPromoAmount(amount) {
  return `${Number(amount || 0).toLocaleString("en-US")} TZS`;
}

function getAgentDaysLeft(agent) {
  const totalDays = Math.max(0, Number(agent?.subscriptionDays) || 0);
  if (!agent?.createdAt) return totalDays;
  const createdAt = new Date(agent.createdAt);
  if (Number.isNaN(createdAt.getTime())) return totalDays;
  const elapsedDays = Math.floor((Date.now() - createdAt.getTime()) / (24 * 60 * 60 * 1000));
  return Math.max(0, totalDays - Math.max(0, elapsedDays));
}

function getAgentEffectiveStatus(agent) {
  if (!agent) return "suspended";
  if (agent.status === "suspended") return "suspended";
  return getAgentDaysLeft(agent) <= 0 ? "suspended" : "active";
}

function getAgentSubscriptionMeta(agent) {
  const days = getAgentDaysLeft(agent);
  const isFreePlan = (agent.plan || "Free Plan") === "Free Plan";
  const text = isFreePlan
    ? days > 0 ? `${days} day${days !== 1 ? "s" : ""} left on free plan` : "Free plan expired"
    : days > 0 ? `${days} day${days !== 1 ? "s" : ""} left` : "Subscription expired";
  const tone = days <= 3 ? "danger" : days <= 5 ? "warn" : "ok";
  return { text, tone, days };
}

function getAgentForProduct(product) {
  if (!product?.agentId) return null;
  return state.agents.find(agent => agent.id === product.agentId) || null;
}

function isProductOwnedBySuspendedAgent(product) {
  const agent = getAgentForProduct(product);
  return Boolean(agent) && getAgentEffectiveStatus(agent) === "suspended";
}

function getClaimedProducts() {
  return state.products.filter(product => product.isClaimed && isFreePrice(product.price));
}

function getFilteredClaimedProducts() {
  const term = state.claimedSearch.toLowerCase();
  return getClaimedProducts().filter(product => {
    return !term
      || product.title.toLowerCase().includes(term)
      || String(product.idNumber || "").toLowerCase().includes(term)
      || String(product.claimedByName || "").toLowerCase().includes(term)
      || String(product.claimedByEmail || "").toLowerCase().includes(term);
  });
}

function formatAgentCreatedAt(createdAt) {
  if (!createdAt) return "Recently";
  const date = new Date(createdAt);
  if (Number.isNaN(date.getTime())) return "Recently";
  return date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function getFilteredProducts() {
  const term = state.search.toLowerCase();
  return state.products.filter(p => {
    if (!canViewProductInListings(p)) return false;
    const matchSearch  = p.title.toLowerCase().includes(term) || String(p.idNumber || "").toLowerCase().includes(term);
    const matchCat     = state.category === "all" || (p.category || "Uncategorized") === state.category;
    const matchTrend   = state.productFilter !== "trending" || (p.trending && isPromotionStillValidForProduct(p));
    const matchFree    = state.productFilter !== "free" || isFreePrice(p.price);
    const matchAgent   = !state.agentProductFilterId || p.agentId === state.agentProductFilterId;
    return matchSearch && matchCat && matchTrend && matchFree && matchAgent;
  });
}

function syncPromoDraft(event) {
  const form = event?.currentTarget?.form || event?.target?.form;
  if (!form) return;
  const fd = new FormData(form);
  const previous = state.promoDraft || {};
  let startDate = fd.get("startDate")?.toString() || previous.startDate || new Date().toISOString().slice(0, 10);
  let endDate = fd.get("endDate")?.toString() || previous.endDate || startDate;
  let daysCount = Math.max(1, parseInt(fd.get("daysCount"), 10) || 1);

  if (event?.target?.name === "daysCount" || event?.target?.name === "startDate") {
    endDate = addDaysToDate(startDate, daysCount - 1);
  } else if (event?.target?.name === "endDate") {
    daysCount = getInclusiveDaysBetween(startDate, endDate);
  }

  state.promoDraft = normalizePromoDraft({
    ...previous,
    postCount: Math.max(1, parseInt(fd.get("postCount"), 10) || 1),
    daysCount,
    startDate,
    endDate,
  });
  renderPromoModal();
}

async function handleAuthSubmit() {
  const email    = $("#auth-email")?.value?.trim();
  const password = $("#auth-password")?.value ?? "";
  if (!email || !password) { toast("Please enter credentials", "error"); return; }

  if (state.authMode === "login") {
    if (!hasSecureAuth()) { toast("Secure login backend unavailable", "error"); return; }
    showLoadingOverlay("Signing in…");
    try {
      await signInWithSupabaseAuth(email, password);
      const user = await syncUserFromAuthSession();
      if (!user) throw new Error("Unable to load account profile");

      if (user.role === "agent") {
        const agent = getCurrentAgentRecord() || await fetchAgentByEmail(user.email);
        if (!agent) {
          await signOutFromSupabaseAuth();
          state.user = null;
          saveSession(null);
          toast("Agent account is not provisioned yet", "error");
          return;
        }
        if (getAgentEffectiveStatus(agent) === "suspended") {
          await signOutFromSupabaseAuth();
          state.user = null;
          saveSession(null);
          toast("This agent account is suspended", "error");
          return;
        }
      }

      toast(`Welcome, ${user.email}`, "success");
      state.view = user.role === "user" ? "home" : "dashboard";
      closeAuth();
      render();
    } catch (err) {
      console.error("Login error:", err);
      toast(err?.message || "Login failed — check your connection", "error");
    } finally {
      hideLoadingOverlay();
    }
  } else {
    const fullName        = $("#auth-name")?.value?.trim();
    const confirmPassword = $("#auth-confirm-password")?.value?.trim();
    if (!fullName) { toast("Please enter your full name", "error"); return; }
    if (password.length < 6) { toast("Password must be at least 6 characters", "error"); return; }
    if (password !== confirmPassword) { toast("Passwords do not match", "error"); return; }
    if (!hasSecureAuth()) { toast("Secure signup backend unavailable", "error"); return; }

    showLoadingOverlay("Creating account…");
    try {
      const result = await signUpWithSupabaseAuth(fullName, email, password);
      const authUser = result?.user || result?.session?.user || null;
      if (result?.session?.user && authUser?.id && authUser?.email) {
        await upsertOwnProfile({
          userId: authUser.id,
          email: authUser.email,
          fullName,
          role: "user",
        });
      }
      if (result?.session?.user) {
        const user = await syncUserFromAuthSession();
        toast(`Welcome, ${user?.email || email}`, "success");
        closeAuth();
        render();
      } else {
        toast("Account created. Check your email to confirm your account if required.", "success");
        toggleAuthMode();
      }
    } catch (err) {
      console.error("Signup error:", err);
      toast(err?.message || "Signup failed", "error");
    } finally {
      hideLoadingOverlay();
    }
  }
}

async function handleAgentSubmit(event) {
  event.preventDefault();
  if (!isAdminUser()) { toast("Admin access required", "error"); return; }

  const fd   = new FormData(event.target);
  const fullName         = fd.get("fullName")?.toString().trim();
  const email            = fd.get("email")?.toString().trim().toLowerCase();
  const plan             = fd.get("plan")?.toString() || "Free Plan";
  const subscriptionDays = Math.max(0, parseInt(fd.get("subscriptionDays"), 10) || 0);

  if (!fullName || !email) { toast("Full name and email are required", "error"); return; }

  const duplicate = state.agents.find(a => a.email === email && a.id !== state.agentEditing?.id);
  if (duplicate) { toast("An agent with that email already exists", "error"); return; }

  const prev = state.agents.map(a => ({ ...a }));

  if (state.agentEditing) {
    const updated = state.agents.map(a => a.id !== state.agentEditing.id ? a
      : { ...a, fullName, email, plan, subscriptionDays });
    const upAgent = updated.find(a => a.id === state.agentEditing.id);
    try {
      if (upAgent) await syncAgentToSupabase(upAgent);
    } catch (err) { state.agents = prev; toast(err.message || "Agent sync failed", "error"); renderMain(); return; }
    state.agents = updated;
    saveAgents(state.agents);
    toast("Agent updated", "success");
  } else {
    const newAgent = {
      id: generateUUID(), fullName, email, plan, subscriptionDays,
      status: "active", createdAt: new Date().toISOString(),
    };
    try {
      await syncAgentToSupabase(newAgent);
    } catch (err) { state.agents = prev; toast(err.message || "Agent sync failed", "error"); renderMain(); return; }
    state.agents = [newAgent, ...state.agents];
    saveAgents(state.agents);
    toast("Agent registered", "success");
  }

  state.view = "agents";
  closeAgentModal();
  renderMain();
}

    await syncProductToSupabase(updatedProd);
