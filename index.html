<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Spinner Loader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1425 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.1) 0%, transparent 50%);
            animation: backgroundShift 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes backgroundShift {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .loader-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Main spinner container */
        .spinner-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Outer rotating ring with gradient */
        .spinner-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #0EA5E9,
                #06B6D4,
                #A78BFA,
                #0EA5E9
            );
            background-clip: border-box;
            -webkit-mask: linear-gradient(#fff 0%, #fff) content-box, linear-gradient(#fff 0%, #fff);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spinnerRotate 2s linear infinite, spinnerGrow 3s ease-in-out infinite;
        }

        /* Middle ring */
        .spinner-middle {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px solid transparent;
            border-radius: 50%;
            background: conic-gradient(
                from 180deg,
                #A78BFA,
                #06B6D4,
                #0EA5E9,
                #A78BFA
            );
            background-clip: border-box;
            -webkit-mask: linear-gradient(#fff 0%, #fff) content-box, linear-gradient(#fff 0%, #fff);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spinnerRotateReverse 3s linear infinite, spinnerGrowReverse 3s ease-in-out infinite;
            opacity: 0.7;
        }

        /* Inner glowing core */
        .spinner-core {
            position: absolute;
            width: 35%;
            height: 35%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(167, 139, 250, 0.8), rgba(14, 165, 233, 0.4));
            box-shadow: 
                0 0 30px rgba(14, 165, 233, 0.6),
                0 0 60px rgba(167, 139, 250, 0.4),
                inset 0 0 20px rgba(6, 182, 212, 0.3);
            animation: corePulse 2s ease-in-out infinite;
        }

        /* Glow effect behind spinner */
        .spinner-glow {
            position: absolute;
            width: 140%;
            height: 140%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(14, 165, 233, 0.3),
                rgba(167, 139, 250, 0.3),
                rgba(6, 182, 212, 0.3),
                rgba(14, 165, 233, 0.3)
            );
            filter: blur(20px);
            animation: spinnerRotate 2.5s linear infinite;
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes spinnerRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spinnerRotateReverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes spinnerGrow {
            0%, 100% { 
                width: 100%;
                height: 100%;
            }
            50% { 
                width: 110%;
                height: 110%;
            }
        }

        @keyframes spinnerGrowReverse {
            0%, 100% { 
                width: 80%;
                height: 80%;
            }
            50% { 
                width: 70%;
                height: 70%;
            }
        }

        @keyframes corePulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 
                    0 0 30px rgba(14, 165, 233, 0.6),
                    0 0 60px rgba(167, 139, 250, 0.4),
                    inset 0 0 20px rgba(6, 182, 212, 0.3);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 
                    0 0 40px rgba(14, 165, 233, 0.8),
                    0 0 80px rgba(167, 139, 250, 0.5),
                    inset 0 0 30px rgba(6, 182, 212, 0.4);
            }
        }

        /* Loading text */
        .loader-text {
            text-align: center;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f0f9ff;
            text-transform: uppercase;
            animation: textFade 2s ease-in-out infinite;
        }

        /* Progress bar */
        .progress-bar-container {
            width: 200px;
            height: 3px;
            background: rgba(14, 165, 233, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0EA5E9, #06B6D4, #A78BFA);
            border-radius: 2px;
            width: 0%;
            animation: progressFill 10s linear forwards;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.8);
        }

        @keyframes progressFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes textFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .loader-dots {
            display: inline-block;
            width: 30px;
            text-align: left;
        }

        .dot {
            display: inline-block;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #0EA5E9;
            margin: 0 2px;
            animation: dotBounce 1.4s infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { 
                opacity: 0.4;
                transform: translateY(0);
            }
            40% { 
                opacity: 1;
                transform: translateY(-6px);
            }
        }

        /* Floating accent elements */
        .accent-dot {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.8), transparent);
            pointer-events: none;
        }

        .accent-dot:nth-child(1) {
            width: 8px;
            height: 8px;
            top: 15%;
            left: 10%;
            animation: float1 6s ease-in-out infinite;
            opacity: 0.5;
        }

        .accent-dot:nth-child(2) {
            width: 6px;
            height: 6px;
            top: 20%;
            right: 15%;
            animation: float2 7s ease-in-out infinite;
            opacity: 0.4;
        }

        .accent-dot:nth-child(3) {
            width: 5px;
            height: 5px;
            bottom: 20%;
            left: 12%;
            animation: float3 8s ease-in-out infinite;
            opacity: 0.45;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(40px, 20px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .spinner-container {
                width: 100px;
                height: 100px;
            }

            .loader-text {
                font-size: 16px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating accent elements -->
    <div class="accent-dot"></div>
    <div class="accent-dot"></div>
    <div class="accent-dot"></div>

    <!-- Main loader -->
    <div class="loader-wrapper">
        <div class="spinner-container">
            <div class="spinner-glow"></div>
            <div class="spinner-outer"></div>
            <div class="spinner-middle"></div>
            <div class="spinner-core"></div>
        </div>

        <div class="loader-text">
            Loading
            <span class="loader-dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </span>
        </div>

        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <script>
        // Redirect to website after 10 seconds
        setTimeout(() => {
            window.location.href = 'https://lomi-o3sh.onrender.com';
        }, 10000);
    </script>
</body>
</html>
